<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RAGNARHOST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
        
        :root {
            --neon-blue: #00d4ff;
            --deep-black: #0a0a0f;
            --slate: #1a1a2e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0d1b2a 100%);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .font-orbitron { font-family: 'Orbitron', monospace; }
        
        .neon-text {
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        
        .card-dark {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }
        
        .input-field {
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 10px;
            width: 100%;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0098b3);
            color: #0a0a0f;
            font-weight: 700;
            padding: 12px 32px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
        }
        
        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
            transform: scale(1.02);
        }
        
        .flash-error {
            background: rgba(255, 50, 50, 0.15);
            border: 1px solid rgba(255, 50, 50, 0.3);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        
        .flash-success {
            background: rgba(50, 255, 50, 0.15);
            border: 1px solid rgba(50, 255, 50, 0.3);
            color: #6bff6b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="px-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-orbitron font-bold neon-text">RAGNARHOST</h1>
            <p class="text-gray-400 mt-2">Create your account</p>
        </div>
        
        <!-- Register Card -->
        <div class="card-dark p-6 sm:p-8">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="{% if category == 'error' %}flash-error{% else %}flash-success{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('register') }}" id="registerForm">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2 text-gray-300">Username</label>
                    <input type="text" name="username" class="input-field" placeholder="Choose a username" required minlength="3" maxlength="30">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2 text-gray-300">Email</label>
                    <input type="email" name="email" class="input-field" placeholder="your@email.com" required>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2 text-gray-300">Password</label>
                    <input type="password" name="password" class="input-field" placeholder="Min. 6 characters" required minlength="6">
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2 text-gray-300">Confirm Password</label>
                    <input type="password" name="confirm_password" class="input-field" placeholder="Confirm your password" required minlength="6">
                </div>
                
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-400">
                    Already have an account? 
                    <a href="{{ url_for('login') }}" class="text-cyan-400 hover:text-cyan-300 font-semibold">Sign in</a>
                </p>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center mt-8">
            <p class="text-gray-500 text-sm">
                Developed entirely by JAGWAR. All rights reserved.
            </p>
        </div>
    </div>
    
    <script>
        // Client-side validation
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const username = this.querySelector('input[name="username"]').value.trim();
            const email = this.querySelector('input[name="email"]').value.trim();
            const password = this.querySelector('input[name="password"]').value;
            const confirmPassword = this.querySelector('input[name="confirm_password"]').value;
            
            if (!username || !email || !password || !confirmPassword) {
                e.preventDefault();
                alert('Please fill in all fields.');
                return;
            }
            
            if (username.length < 3 || username.length > 30) {
                e.preventDefault();
                alert('Username must be between 3 and 30 characters.');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                e.preventDefault();
                alert('Please enter a valid email address.');
                return;
            }
            
            if (password.length < 6) {
                e.preventDefault();
                alert('Password must be at least 6 characters.');
                return;
            }
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match.');
                return;
            }
        });
    </script>
</body>
</html>
